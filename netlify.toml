[build]
  publish = "."
  functions = "netlify/functions"

# Environment variables (Netlify Dashboard → Site configuration → Environment variables):
#
# Ask A Local + Route operator (OpenAI Responses API):
#   OPENAI_API_KEY           — required for visitor-concierge and transportation-operator functions
#   OPENAI_VISITOR_MODEL     — optional override for visitor concierge (default: gpt-4.1-mini)
#   OPENAI_TRANSPORT_MODEL   — optional override for transportation operator (else OPENAI_VISITOR_MODEL / default)
#
# Transportation request intake (transportation-request function):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY   — server-only; never expose to the browser
#   TWILIO_ACCOUNT_SID          — SMS alerts
#   TWILIO_AUTH_TOKEN
#   TWILIO_FROM_NUMBER
#   TRANSPORT_ALERT_PHONE       — owner SMS destination (E.164)
#   RESEND_API_KEY              — email alerts
#   TRANSPORT_ALERT_EMAIL       — owner inbox
#   RESEND_FROM_EMAIL           — verified sender in Resend (required for email to send)
#
# Business Operator + business leads (business-operator.js + business-lead.js):
#   OPENAI_API_KEY              — required for operator chat (same key as Ask / Transport)
#   OPENAI_BUSINESS_MODEL       — optional override (else OPENAI_VISITOR_MODEL / default)
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   RESEND_API_KEY
#   BUSINESS_ALERT_EMAIL        — preferred inbox for business lead alerts
#   TRANSPORT_ALERT_EMAIL       — fallback if BUSINESS_ALERT_EMAIL is unset
#   BUSINESS_RESEND_FROM_EMAIL  — optional verified From for business alerts (else onboarding@resend.dev)
#   BUSINESS_ALERT_PHONE        — optional SMS destination (E.164); else TRANSPORT_ALERT_PHONE
#   TWILIO_*                    — optional; SMS failures never fail the lead save
#   Supabase public.business_leads needs boolean alert_email_sent (default false); set true after Resend succeeds.
#
# Owner Command Dashboard (owner-dashboard-data + owner-dashboard-update):
#   OWNER_DASHBOARD_KEY          — private key for /owner-dashboard/?key=... (never commit or expose in JS source)
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY — same as lead intake functions
#   Supabase: business_leads + transportation_requests need status, owner_notes,
#             last_contacted_at, updated_at (see supabase/owner-dashboard-v2-migration.sql)
